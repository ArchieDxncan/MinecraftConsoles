<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cloud saves — LegacyDxncan Account Manager</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <nav class="site-nav" aria-label="Main">
        <a href="index.html" class="nav-link">Home</a>
        <a href="friends.html" class="nav-link">Friends</a>
        <a href="cloud.html" class="nav-link nav-link-active">Cloud saves</a>
      </nav>
    </header>

    <main class="page-main">
      <h1>Cloud saves</h1>
      <p class="sub">Link a provider to allow the game to sync worlds.</p>

      <div id="screen-guest" class="card">
        <p>You need to sign in on the home page first.</p>
        <p><a href="index.html" class="inline-link">Go to Home to sign in</a></p>
      </div>

      <div id="screen-app" class="hidden">
        <div class="session-bar">
          <span>Signed in as <strong id="signed-username"></strong></span>
          <button type="button" id="btn-logout" class="btn-ghost">Sign out</button>
        </div>

        <div class="card">
          <section class="social-section cloud-save" aria-labelledby="cloud-save-heading">
            <h2 id="cloud-save-heading">Link cloud storage</h2>
            <p class="social-section-note">
              While you stay on the game&rsquo;s title screen, worlds sync in the background.
            </p>
            <div id="cloud-save-status" class="cloud-save-status muted">Loading…</div>
            <div class="row cloud-save-buttons">
              <button type="button" id="btn-oauth-google" class="btn-secondary">Connect Google Drive</button>
              <button type="button" id="btn-oauth-microsoft" class="btn-secondary">Connect OneDrive</button>
              <button type="button" id="btn-oauth-dropbox" class="btn-secondary">Connect Dropbox</button>
            </div>
            <button type="button" id="btn-cloud-unlink" class="btn-danger btn-small hidden">Disconnect cloud</button>
          </section>
          <div id="cloud-error" class="error hidden" role="alert"></div>
        </div>
      </div>
    </main>
    <script src="shared.js"></script>
    <script src="cloud-page.js"></script>
  </body>
</html>
